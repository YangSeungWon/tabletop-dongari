<html lang="ko">

<head></head>
<meta charset="UTF-8">
<title>테이블탑: 보드게임 목록</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<script type="module" src="scripts/main.js?t=20250223" defer></script>
</head>

<body>
    <header>
        <h1>테이블탑: 포스텍 대학원 보드게임 동아리</h1>
        <nav>
            <a href="index.html" class="button">홈</a>
            <a href="game.html" class="button">게임 목록</a>
            <a href="logs.html" class="button">모임 일지</a>
        </nav>
    </header>
    <section id="games">
        <h2>보유 보드게임 목록</h2>

        <div id="filters">
            <label for="player-count">플레이어 수:</label>
            <input type="number" id="player-count" name="player-count" min="1" placeholder="예: 3">

            <button id="reset-button" class="button">필터 초기화</button>
        </div>

        <div id="filter-status" class="filter-status">
            <!-- 필터 상태 메시지가 여기에 표시됩니다 -->
        </div>

        <table id="game-table">
            <thead>
                <tr>
                    <th>게임 이름<br /><button class="sort-button better-gradient" id="name-sort-button">A ▶︎ Z</button>
                    </th>
                    <th>평점<br /><button class="sort-button desc worse-gradient" id="score-sort-button">10 ▶︎ 1</button>
                    </th>
                    <th>난도<br /><button class="sort-button worse-gradient" id="weight-sort-button">1 ▶︎ 5</button></th>
                    <th>베스트<br />인원</th>
                    <th>추천<br />인원</th>
                    <th>가능<br />인원</th>
                    <th>플레이 시간<br /><button class="sort-button worse-gradient" id="playtime-sort-button">S ▶︎ L</button>
                    </th>
                    <th>최근 플레이<br /><button class="sort-button desc worse-gradient" id="date-sort-button">R ▶︎
                            X</button></th>
                </tr>
            </thead>
            <tbody id="game-list">
                <!-- JavaScript로 생성된 게임 항목들이 여기에 추가됩니다. -->
            </tbody>
        </table>
    </section>

    <section id="wishlist">
        <h2>위시리스트</h2>
        <table id="wishlist-table">
            <thead>
                <tr>
                    <th>게임 이름</th>
                    <th>평점</th>
                    <th>난도</th>
                    <th>베스트<br />인원</th>
                    <th>추천<br />인원</th>
                    <th>가능<br />인원</th>
                    <th>플레이 시간</th>
                    <th>구매 보류 이유</th>
                </tr>
            </thead>
            <tbody id="wishlist-items">
                <!-- JavaScript로 생성된 위시리스트 항목들이 여기에 추가됩니다. -->
            </tbody>
        </table>
    </section>

    <script src="footer.js?t=20250223"></script>
</body>

</html>
